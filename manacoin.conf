# ============================================================
#  ManaCoin (MNC) — Node Configuration File
#  Save as: ~/.manacoin/manacoin.conf
# ============================================================

# ── RPC Server (required for mining pool) ───────────────────
server=1
rpcuser=manacoinrpc
rpcpassword=CHANGE_THIS_TO_A_STRONG_PASSWORD
rpcallowip=127.0.0.1
rpcport=9889

# ── Network ─────────────────────────────────────────────────
listen=1
port=9888
maxconnections=125

# ── Bootstrap Nodes (add your seed node IPs here) ───────────
# addnode=YOUR_SEED_NODE_IP:9888
# addnode=YOUR_SECOND_NODE_IP:9888

# ── Mining ──────────────────────────────────────────────────
# Set to your MNC wallet address to solo mine
# gen=1
# genproclimit=-1  (-1 = use all CPU cores)

# ── Logging ─────────────────────────────────────────────────
debug=0
printtoconsole=0
shrinkdebugfile=1

# ── Performance ─────────────────────────────────────────────
dbcache=512
par=2

# ── Wallet ──────────────────────────────────────────────────
keypool=200
txconfirmtarget=6
